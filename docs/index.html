<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Suivi Midea PortaSplit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 16px;
      background: #fafafa;
      color: #111;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 4px;
    }

    .meta {
      color: #666;
      font-size: 13px;
      margin-bottom: 16px;
    }

    button {
      padding: 9px 12px;
      border: 1px solid #bbb;
      border-radius: 6px;
      background: white;
      cursor: pointer;
      margin-bottom: 12px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background: white;
      font-size: 14px;
    }

    th, td {
      border-bottom: 1px solid #ddd;
      padding: 9px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f1f1f1;
    }

    .status {
      font-weight: bold;
      white-space: nowrap;
    }

    .small {
      color: #666;
      font-size: 12px;
    }

    a {
      color: #0645ad;
    }

    @media (max-width: 760px) {
      table, thead, tbody, tr, th, td {
        display: block;
      }

      thead {
        display: none;
      }

      tr {
        border: 1px solid #ddd;
        border-radius: 8px;
        margin-bottom: 12px;
        padding: 8px;
        background: white;
      }

      td {
        border: none;
        padding: 5px 0;
      }

      td::before {
        content: attr(data-label) " : ";
        font-weight: bold;
      }

      .status {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <h1>Suivi Midea PortaSplit</h1>
  <div class="meta" id="meta">Chargement...</div>

  <button onclick="loadStatus()">Rafraîchir</button>

  <table>
    <thead>
      <tr>
        <th>Site</th>
        <th>Statut</th>
        <th>Prix</th>
        <th>Dernière vérification</th>
        <th>Alerte</th>
        <th>Détail</th>
        <th>Lien</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <script>
    async function loadStatus() {
      const tbody = document.getElementById('tbody');
      const meta = document.getElementById('meta');

      tbody.innerHTML = '<tr><td colspan="7">Chargement...</td></tr>';

      try {
        const response = await fetch('status.json?t=' + Date.now());

        if (!response.ok) {
          throw new Error('status.json introuvable');
        }

        const data = await response.json();

        meta.textContent =
          'Dernière mise à jour : ' +
          formatDate(data.generatedAt) +
          ' — Prix maximum : ' +
          data.maxPrice +
          ' €';

        tbody.innerHTML = '';

        data.results.forEach(row => {
          const tr = document.createElement('tr');

          tr.innerHTML = `
            <td data-label="Site">${escapeHtml(row.site)}</td>
            <td data-label="Statut" class="status">${escapeHtml(row.status)}</td>
            <td data-label="Prix">${escapeHtml(row.priceText || '—')}</td>
            <td data-label="Dernière vérification">${formatDate(row.checkedAt)}</td>
            <td data-label="Alerte">${row.alertSent ? 'Oui' : 'Non'}</td>
            <td data-label="Détail">
              ${escapeHtml(row.detail || '')}
              ${row.alertError ? '<br><span class="small">Erreur alerte : ' + escapeHtml(row.alertError) + '</span>' : ''}
            </td>
            <td data-label="Lien"><a href="${row.url}" target="_blank">Ouvrir</a></td>
          `;

          tbody.appendChild(tr);
        });

      } catch (error) {
        meta.textContent = 'Erreur : ' + error.message;
        tbody.innerHTML = '';
      }
    }

    function formatDate(value) {
      if (!value) return '—';

      return new Intl.DateTimeFormat('fr-FR', {
        dateStyle: 'short',
        timeStyle: 'short',
        timeZone: 'Europe/Paris'
      }).format(new Date(value));
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    loadStatus();
  </script>
</body>
</html>
